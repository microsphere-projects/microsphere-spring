name: Generate Wiki Documentation

on:
  push:
    branches:
      - main
    paths:
      - '**/src/main/java/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build doc generator
        run: ./mvnw compile -pl microsphere-spring-doc-generator -am --batch-mode -DskipTests

      - name: Generate wiki pages
        run: |
          ./mvnw exec:java \
            -pl microsphere-spring-doc-generator \
            -Dexec.mainClass="io.microsphere.spring.doc.WikiDocGenerator" \
            -Dexec.args="${GITHUB_WORKSPACE} ${GITHUB_WORKSPACE}/wiki-output" \
            --batch-mode

      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy generated pages to wiki
        run: |
          cp wiki-output/*.md wiki/
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to wiki pages"
          else
            git commit -m "docs: update wiki pages from source code [skip ci]"
            git push
          fi
